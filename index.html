<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎂</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

/* Message */
.message {
  position: absolute;
  top: 20%;
  width: 100%;
  font-size: 22px;
  z-index: 2;
}

/* Heart particles */
.heart {
  position: absolute;
  color: pink;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh) scale(0.5);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) scale(1.5);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="message">
  <p>Hey you ❤️</p>
  <p>Happy Birthday 🎂</p>
  <p>May God bless you ✨</p>
  <p>And give you many happiness 💖</p>
</div>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 200);
</script>

</body>
</html>
